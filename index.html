<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root{
            --primary-color:#405539;
        }
        body{
            margin:0%;
            padding:0%;
            background-color:#405539;
        }
        .nav-bar{
           display:flex;
           gap:8rem;
           width:90%;
           place-items:center;
           justify-content:center;
           
        }
        .navs{
            display:inline-flex;
            place-items: center;
            gap:6rem;
            border-radius: 3rem;
            outline:2px solid rgb(182, 162, 129,0.4);
            padding:1rem;
        }
        .navs a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }
        h2{
            font-size:3rem;
        }
        a:hover{
            background-color:rgb(34, 71, 3);
            padding:5px;
            border-radius:3px;
        }
        .hom{
            font-size:2rem;
            display:none;
            position:relative;
        }
        .homes{
            display:none;
            margin-top:14rem;
            margin-left:22rem;
            height:11rem;
            width:7.8rem;
            border-radius:2rem;
            outline:2px solid rgb(235, 243, 235,0.2);
            background-color:rgb(2, 49, 2);
        }
        .list-options{
            list-style-type: none;
            color:white;
            margin-left:-26px;
        }
        @media screen and (max-width:480px){
            .navs{
                display:none;
            }
            .hom{display:block;
            position:relative;}
            h2{font-size:2.3rem;}
           
            .homes{
            display:absolute;
            margin-top:14rem;
            margin-left:22rem;
            height:11rem;
            width:7.8rem;
            border-radius:2rem;
            outline:2px solid rgb(235, 243, 235,0.2);
            background-color:rgb(2, 49, 2);
        }

            .hom:hover .homes{
                display:block;
            }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
     <div class="intro-name"><h2>Princy Patel</h2></div>
     <div class="navs">
        <a href="index.html">HOME</a>
        <a href="index1.html">PROJECT1</a>
        <a href="index.html">PROJECT2</a>
        <a href="index.html">PROJECT3</a>
     </div>
     <div class="hom"><a ><i class="fa-solid fa-house"></i></a></div>
     <div class="homes">
        <ul class="list-options">
            <li><a>HOME</a></li><br>
            <li><a>PROJECTS1</a></li><br>
            <li><a>PROJECTS2</a></li><br>
            <li><a>PROJECTS3</a></li><br>
        </ul>
     </div>
    </nav>
